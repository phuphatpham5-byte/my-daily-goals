<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Daily Goals & Dashboard</title>
    <link rel="stylesheet" href="style.css">
    <link rel="manifest" href="manifest.json">
</head>
<body>
    <div id="theme-settings">
        <span style="font-weight: bold; margin-right: 10px;">🎨 Tùy chỉnh Web:</span>
        <label class="color-picker-label">Màu nền: <input type="color" id="color-bg"></label>
        <label class="color-picker-label">Màu nút: <input type="color" id="color-primary"></label>
        <label class="color-picker-label">Màu chữ: <input type="color" id="color-text"></label>
        <button onclick="resetTheme()">Reset</button>
    </div>

    <header>
        <h1>My Dashboard 🔥</h1>
        <p>Kéo thả các khối (☰) để sắp xếp giao diện</p>
    </header>

    <div id="drag-container">
        
        <section class="draggable-module" draggable="true" id="module-goals">
            <div class="drag-handle">☰ Mục Tiêu & Active Recall</div>
            <div class="controls">
                <input type="date" id="date-picker">
                <div class="add-goal-box">
                    <input type="text" id="goal-input" placeholder="Nhập mục tiêu mới...">
                    <button id="add-btn">Thêm</button>
                </div>
            </div>
            
            <div id="recall-notice" class="hidden">
                <strong>🧠 Active Recall Hôm Nay:</strong>
                <ul id="recall-list"></ul>
            </div>

            <main id="goal-container" class="grid-container"></main>
        </section>

        <section class="draggable-module" draggable="true" id="module-sheets">
            <div class="drag-handle">☰ Bảng Thống Kê Cá Nhân</div>
            <div class="sheet-controls">
                <button onclick="sheetAddRow()">+ Thêm Hàng</button>
                <button onclick="sheetAddCol()">+ Thêm Cột</button>
                <button onclick="calculateAverage()" class="btn-calc">📊 Tính Điểm Trung Bình</button>
            </div>
            <div class="table-responsive">
                <table id="mini-sheet"></table>
            </div>
        </section>

        <section class="draggable-module" draggable="true" id="module-wheel">
            <div class="drag-handle">☰ Vòng Quay May Mắn</div>
            
            <div class="wheel-split-layout">
                <div class="wheel-left">
                    <label for="wheel-items" style="margin-bottom:8px; font-weight:bold;">Danh sách (Mỗi dòng 1 mục):</label>
                    <textarea id="wheel-items" rows="6" placeholder="Ăn phở&#10;Học code&#10;Ngủ nướng"></textarea>
                    <button onclick="updateWheel()" style="margin-top:10px; margin-bottom: 20px;">Cập nhật vòng quay</button>
                    
                    <div class="wheel-color-settings">
                        <p style="font-weight:bold; margin-bottom: 10px; font-size: 0.9rem;">🎨 Cài đặt màu vòng quay:</p>
                        <div style="display: flex; gap: 10px; flex-wrap: wrap; align-items: center;">
                            <label class="color-picker-label" title="Màu xen kẽ 1">Màu 1: <input type="color" id="w-color-1"></label>
                            <label class="color-picker-label" title="Màu xen kẽ 2">Màu 2: <input type="color" id="w-color-2"></label>
                            <label class="color-picker-label" title="Màu của chữ trong vòng quay">Chữ: <input type="color" id="w-color-text"></label>
                            <button onclick="resetWheelColors()" class="btn-reset-wheel">Reset</button>
                        </div>
                    </div>
                </div>

                <div class="wheel-right">
                    <div class="wheel-box">
                        <div id="wheel"></div>
                        <div class="wheel-pointer">▼</div>
                    </div>
                    <button id="spin-btn" onclick="spinWheel()">QUAY!</button>
                    <p id="wheel-result"></p>
                </div>
            </div>
        </section>

    </div>

    <footer>
        <button id="export-btn">📥 Backup Data</button>
        <button id="clear-btn" style="background:var(--coral-red)">🗑 Xóa Data</button>
    </footer>

    <script src="app.js"></script>
</body>
</html>
